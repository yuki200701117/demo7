<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>延恩鎮 v2</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+TC:wght@400;700;900&display=swap');
:root{
  --bg:#0a0a18;--panel:#13132a;--border:#4a90d9;--accent:#f7d94c;
  --pink:#e85d9e;--green:#4ecb71;--red:#e85050;--text:#e8e8f0;--dim:#8888aa;
  --tile:32px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;
  width:100vw;height:100dvh;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.pf{font-family:'Press Start 2P',monospace;}

/* ====== SCREENS ====== */
.screen{display:none;width:100%;height:100dvh;flex-direction:column;}
.screen.active{display:flex;}

/* ====== TITLE ====== */
#scr-title{align-items:center;justify-content:center;gap:0;background:var(--bg);position:relative;overflow:hidden;}
.title-grid{position:absolute;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 31px,rgba(74,144,217,.06) 32px),
             repeating-linear-gradient(90deg,transparent,transparent 31px,rgba(74,144,217,.06) 32px);}
.city-skyline{position:absolute;bottom:0;left:0;right:0;height:90px;
  background:#12122a;
  clip-path:polygon(0 100%,0 55%,4% 55%,4% 35%,8% 35%,8% 55%,12% 55%,12% 20%,16% 20%,16% 55%,20% 55%,20% 40%,24% 40%,24% 55%,28% 55%,28% 15%,32% 15%,32% 55%,36% 55%,36% 45%,40% 45%,40% 55%,44% 55%,44% 25%,48% 25%,48% 55%,52% 55%,52% 50%,56% 50%,56% 55%,60% 55%,60% 30%,64% 30%,64% 55%,68% 55%,68% 18%,72% 18%,72% 55%,76% 55%,76% 42%,80% 42%,80% 55%,84% 55%,84% 28%,88% 28%,88% 55%,92% 55%,92% 48%,96% 48%,96% 55%,100% 55%,100% 100%);}
.star-dot{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;}
.title-content{position:relative;z-index:5;text-align:center;padding:20px;}
.game-title{font-family:'Press Start 2P',monospace;font-size:clamp(24px,7vw,42px);color:var(--accent);
  text-shadow:3px 3px 0 #a08000,6px 6px 0 #604800;animation:float 3s ease-in-out infinite;margin-bottom:8px;}
.game-sub{font-family:'Press Start 2P',monospace;font-size:clamp(6px,2vw,10px);color:var(--pink);letter-spacing:3px;margin-bottom:36px;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.t-btn{display:block;background:var(--panel);border:3px solid var(--border);color:var(--text);
  font-family:'Press Start 2P',monospace;font-size:clamp(8px,2.5vw,12px);padding:14px 20px;margin:8px auto;
  cursor:pointer;width:min(280px,85vw);text-align:center;transition:.1s;border-radius:2px;}
.t-btn:active{background:var(--border);color:var(--bg);transform:translate(-1px,-1px);}

/* ====== GAME WRAPPER ====== */
#scr-game{flex-direction:column;background:var(--bg);}

/* Top HUD */
.top-hud{display:flex;align-items:center;justify-content:space-between;
  padding:6px 10px;background:#0d0d20;border-bottom:2px solid var(--border);
  flex-shrink:0;height:44px;}
.hud-day{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--accent);}
.hud-money{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--green);}
.hud-actions{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--pink);}
.hud-btns{display:flex;gap:4px;}
.hud-icon-btn{background:transparent;border:2px solid var(--border);color:var(--text);
  font-size:14px;width:30px;height:30px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* Map viewport */
.map-viewport{flex:1;overflow:hidden;position:relative;}
#map-canvas{position:absolute;top:0;left:0;image-rendering:pixelated;}

/* Bottom panel: dialogue + controls */
.bottom-panel{flex-shrink:0;background:#0d0d20;border-top:2px solid var(--border);}

/* Dialogue box */
.dlg-box{padding:8px 12px;min-height:80px;position:relative;}
.dlg-speaker{font-family:'Press Start 2P',monospace;font-size:9px;color:var(--accent);margin-bottom:5px;}
.dlg-text{font-size:13px;line-height:1.7;color:var(--text);}
.dlg-cursor{display:inline-block;width:8px;height:13px;background:var(--text);animation:blink .8s step-end infinite;vertical-align:middle;}
@keyframes blink{50%{opacity:0}}
.dlg-choices{display:flex;flex-direction:column;gap:3px;margin-top:8px;}
.ch-btn{background:transparent;border:2px solid var(--border);color:var(--text);
  font-family:'Noto Sans TC',sans-serif;font-size:12px;padding:7px 10px;cursor:pointer;text-align:left;border-radius:2px;}
.ch-btn:active{background:var(--border);color:var(--bg);}
.ch-btn::before{content:"▶ ";color:var(--accent);}

/* D-pad */
.dpad-area{display:flex;align-items:center;justify-content:space-between;padding:6px 14px;gap:10px;}
.dpad{display:grid;grid-template-columns:repeat(3,40px);grid-template-rows:repeat(3,40px);gap:2px;flex-shrink:0;}
.dpad-btn{background:#111130;border:2px solid #333366;color:var(--text);
  font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  border-radius:3px;-webkit-tap-highlight-color:transparent;}
.dpad-btn:active{background:var(--border);border-color:var(--border);}
.dpad-center{background:#1a1a3a;border-color:#444466;font-size:10px;}

/* Action buttons */
.act-btns{display:flex;flex-direction:column;gap:5px;flex:1;}
.act-row{display:flex;gap:5px;}
.act-btn{flex:1;background:#111130;border:2px solid #333366;color:var(--text);
  font-family:'Noto Sans TC',sans-serif;font-size:10px;padding:7px 4px;cursor:pointer;
  text-align:center;border-radius:2px;}
.act-btn:active{background:var(--border);color:var(--bg);}
.act-btn .icon{font-size:13px;display:block;}
.act-btn .eff{font-size:8px;color:var(--green);display:block;}
.act-end-day{width:100%;background:#1a1a00;border:2px solid var(--accent);color:var(--accent);
  font-family:'Press Start 2P',monospace;font-size:8px;padding:8px;cursor:pointer;margin-top:4px;border-radius:2px;}
.act-end-day:active{background:var(--accent);color:var(--bg);}

/* ====== STATS SCREEN ====== */
#scr-stats{background:var(--bg);padding:14px;gap:10px;overflow-y:auto;}
.stats-title{font-family:'Press Start 2P',monospace;font-size:12px;color:var(--accent);text-align:center;
  padding-bottom:10px;border-bottom:2px solid var(--border);}
.stat-row{display:flex;flex-direction:column;gap:3px;}
.stat-label{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--dim);display:flex;justify-content:space-between;}
.stat-label span{color:var(--accent);}
.stat-bar{height:12px;background:#1a1a3a;border:2px solid #333355;}
.stat-fill{height:100%;transition:width .4s;}
.fill-design{background:var(--pink);}
.fill-social{background:var(--green);}
.fill-combat{background:#ff8800;}
.fill-mood{background:#60d0ff;}
.fill-favor{background:var(--accent);}
.favor-card{background:rgba(232,93,158,.08);border:2px solid var(--pink);padding:10px;text-align:center;border-radius:2px;}
.favor-big{font-family:'Press Start 2P',monospace;font-size:20px;color:var(--pink);}
.money-card{background:rgba(247,217,76,.05);border:2px solid var(--accent);padding:8px;text-align:center;}
.money-big{font-family:'Press Start 2P',monospace;font-size:14px;color:var(--accent);}
.back-btn{font-family:'Press Start 2P',monospace;font-size:9px;padding:10px;border:2px solid var(--border);
  color:var(--border);background:transparent;cursor:pointer;border-radius:2px;}
.back-btn:active{background:var(--border);color:var(--bg);}

/* ====== INVENTORY ====== */
#scr-inv{background:var(--bg);padding:12px;gap:8px;}
.inv-header{display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid var(--border);padding-bottom:8px;}
.inv-title{font-family:'Press Start 2P',monospace;font-size:11px;color:var(--accent);}
.inv-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;overflow-y:auto;flex:1;padding:4px 0;}
.inv-item{background:var(--panel);border:2px solid #333355;padding:8px 4px;text-align:center;
  cursor:pointer;min-height:70px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border-radius:2px;}
.inv-item:active,.inv-item.selected{border-color:var(--accent);}
.ii-icon{font-size:20px;}
.ii-name{font-size:9px;color:var(--text);}
.ii-count{font-size:9px;color:var(--dim);}
.inv-detail{background:var(--panel);border:2px solid var(--border);padding:10px;border-radius:2px;}
.id-name{font-family:'Press Start 2P',monospace;font-size:9px;color:var(--accent);margin-bottom:6px;}
.id-desc{font-size:11px;color:var(--dim);line-height:1.6;}
.inv-act-row{display:flex;gap:6px;margin-top:8px;}
.ia-btn{font-family:'Press Start 2P',monospace;font-size:7px;padding:8px 10px;cursor:pointer;border:2px solid;background:transparent;border-radius:2px;flex:1;}
.ia-use{border-color:var(--green);color:var(--green);}
.ia-use:active{background:var(--green);color:var(--bg);}
.ia-give{border-color:var(--pink);color:var(--pink);}
.ia-give:active{background:var(--pink);color:var(--bg);}

/* ====== ACHIEVEMENTS ====== */
#scr-ach{background:var(--bg);padding:12px;gap:10px;overflow-y:auto;}
.ach-header{font-family:'Press Start 2P',monospace;font-size:11px;color:var(--accent);text-align:center;
  padding-bottom:10px;border-bottom:2px solid var(--border);}
.ach-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;overflow-y:auto;}
.ach-card{background:var(--panel);border:2px solid #333355;padding:10px;border-radius:2px;text-align:center;}
.ach-card.unlocked{border-color:var(--accent);}
.ach-icon{font-size:24px;margin-bottom:4px;}
.ach-name{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--accent);margin-bottom:4px;line-height:1.6;}
.ach-desc{font-size:10px;color:var(--dim);line-height:1.5;}
.ach-card.locked .ach-icon{filter:grayscale(1);opacity:.3;}
.ach-card.locked .ach-name{color:var(--dim);}

/* ====== SHOP ====== */
#scr-shop{background:var(--bg);padding:12px;gap:8px;}
.shop-hdr{display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid var(--border);padding-bottom:8px;}
.shop-title{font-family:'Press Start 2P',monospace;font-size:11px;color:var(--accent);}
.shop-money{font-family:'Press Start 2P',monospace;font-size:9px;color:var(--green);}
.shop-grid{display:flex;flex-direction:column;gap:6px;overflow-y:auto;flex:1;}
.shop-item{background:var(--panel);border:2px solid #333355;padding:10px 12px;cursor:pointer;
  display:flex;align-items:center;gap:12px;border-radius:2px;}
.shop-item:active{border-color:var(--accent);}
.si-icon{font-size:24px;flex-shrink:0;}
.si-info{flex:1;}
.si-name{font-size:13px;font-weight:bold;margin-bottom:3px;}
.si-eff{font-size:11px;color:var(--dim);}
.si-price{font-family:'Press Start 2P',monospace;font-size:10px;color:var(--accent);flex-shrink:0;}
.si-disc{color:var(--red);font-size:9px;}

/* ====== ENDING ====== */
#scr-end{align-items:center;justify-content:center;gap:20px;padding:30px;}
.end-title{font-family:'Press Start 2P',monospace;font-size:clamp(16px,5vw,28px);text-align:center;animation:float 2s ease-in-out infinite;}
.end-text{font-size:clamp(12px,3.5vw,15px);text-align:center;max-width:500px;line-height:2;color:var(--dim);}

/* ====== COMBAT ====== */
#scr-combat{background:#050510;align-items:center;justify-content:center;gap:12px;padding:16px;}
.combat-arena{width:min(400px,96vw);height:160px;background:#0a0a20;border:3px solid #ff4444;position:relative;overflow:hidden;border-radius:2px;}
.c-bg{position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 15px,rgba(255,68,68,.04) 16px),repeating-linear-gradient(90deg,transparent,transparent 15px,rgba(255,68,68,.04) 16px);}
.c-player,.c-enemy{position:absolute;bottom:12px;display:flex;flex-direction:column;align-items:center;gap:0;}
.c-player{left:30px;}
.c-enemy{right:30px;}
.cf-head{width:18px;height:14px;border-radius:3px 3px 0 0;border:2px solid rgba(0,0,0,.4);}
.cf-body{width:20px;height:12px;border:2px solid rgba(0,0,0,.3);}
.cf-legs{width:18px;height:10px;display:flex;}
.cf-leg{flex:1;border:1px solid rgba(0,0,0,.3);}
.cf-lbl{font-family:'Press Start 2P',monospace;font-size:6px;color:var(--accent);margin-top:3px;white-space:nowrap;}
.c-hud{width:min(400px,96vw);display:flex;justify-content:space-between;align-items:center;}
.hp-blk{font-family:'Press Start 2P',monospace;font-size:7px;background:var(--panel);border:2px solid var(--red);padding:6px 10px;min-width:120px;border-radius:2px;}
.hp-bar{height:8px;background:#1a0a0a;border:2px solid #440000;margin-top:4px;}
.hp-fill{height:100%;background:var(--red);transition:width .3s;}
.c-log{width:min(400px,96vw);background:var(--panel);border:2px solid var(--border);padding:8px;height:60px;overflow-y:auto;font-family:'Press Start 2P',monospace;font-size:7px;color:var(--text);line-height:1.8;border-radius:2px;}
.c-acts{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;width:min(400px,96vw);}
.c-btn{font-family:'Press Start 2P',monospace;font-size:8px;padding:10px;cursor:pointer;border:2px solid;background:transparent;border-radius:2px;}
.c-atk{border-color:var(--red);color:var(--red);}
.c-atk:active{background:var(--red);color:#fff;}
.c-dg{border-color:var(--green);color:var(--green);}
.c-dg:active{background:var(--green);color:var(--bg);}
.c-sn{border-color:var(--accent);color:var(--accent);}
.c-sn:active{background:var(--accent);color:var(--bg);}
.c-rt{border-color:var(--dim);color:var(--dim);}
.c-rt:active{background:var(--dim);color:var(--bg);}

/* ====== NOTIFICATION ====== */
.notif{position:fixed;top:50px;right:10px;background:var(--panel);border:3px solid var(--accent);
  padding:8px 14px;font-family:'Press Start 2P',monospace;font-size:8px;color:var(--accent);z-index:9000;
  animation:slideIn .3s ease,fadeOut .5s ease 2s forwards;max-width:200px;line-height:1.8;border-radius:2px;}
@keyframes slideIn{from{transform:translateX(220px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes fadeOut{from{opacity:1}to{opacity:0;pointer-events:none}}

.ach-popup{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:#1a1200;border:3px solid var(--accent);padding:14px 20px;font-family:'Press Start 2P',monospace;
  font-size:8px;color:var(--accent);z-index:9000;text-align:center;animation:achPop .5s ease;border-radius:2px;
  white-space:nowrap;}
@keyframes achPop{0%{transform:translateX(-50%) scale(.5);opacity:0}70%{transform:translateX(-50%) scale(1.05)}100%{transform:translateX(-50%) scale(1);opacity:1}}

/* Interact prompt */
.interact-prompt{position:absolute;background:rgba(0,0,0,.85);border:2px solid var(--accent);
  color:var(--accent);font-family:'Press Start 2P',monospace;font-size:7px;padding:4px 8px;
  pointer-events:none;z-index:100;white-space:nowrap;border-radius:2px;}

/* Map location badge */
.loc-badge{position:absolute;top:6px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.8);border:2px solid var(--border);color:var(--text);
  font-family:'Press Start 2P',monospace;font-size:7px;padding:3px 8px;z-index:50;border-radius:2px;
  pointer-events:none;}
.time-badge{position:absolute;top:6px;right:8px;
  background:rgba(0,0,0,.8);border:2px solid var(--border);color:var(--accent);
  font-family:'Press Start 2P',monospace;font-size:7px;padding:3px 8px;z-index:50;border-radius:2px;
  pointer-events:none;}
</style>
</head>
<body>

<!-- TITLE -->
<div id="scr-title" class="screen active">
  <div class="title-grid"></div>
  <div class="city-skyline"></div>
  <div class="title-content">
    <div class="game-title">延恩鎮</div>
    <div class="game-sub">MOBILE GALGAME RPG</div>
    <button class="t-btn" onclick="startGame()">▶ 開始遊戲</button>
    <button class="t-btn" onclick="loadSave()">📂 讀取存檔</button>
    <button class="t-btn" onclick="showScreen('scr-ach');renderAch()">🏆 成就收集</button>
    <button class="t-btn" onclick="showHelp()">？ 說明</button>
  </div>
</div>

<!-- MAIN GAME -->
<div id="scr-game" class="screen">
  <div class="top-hud">
    <div>
      <div class="hud-day" id="hud-day">第1天 週一</div>
      <div class="hud-actions" id="hud-acts">♦♦ 行動x2</div>
    </div>
    <div class="hud-money" id="hud-money">💰$3000</div>
    <div class="hud-btns">
      <button class="hud-icon-btn" onclick="showStats()" title="狀態">📊</button>
      <button class="hud-icon-btn" onclick="showInv()" title="背包">🎒</button>
      <button class="hud-icon-btn" onclick="saveGame()" title="存檔">💾</button>
    </div>
  </div>

  <div class="map-viewport" id="map-viewport">
    <canvas id="map-canvas"></canvas>
    <div class="loc-badge" id="loc-badge">市中心廣場</div>
    <div class="time-badge" id="time-badge">☀ 白天</div>
    <div class="interact-prompt" id="interact-prompt" style="display:none">▲ 互動</div>
  </div>

  <div class="bottom-panel">
    <div class="dlg-box" id="dlg-box">
      <div class="dlg-speaker" id="dlg-spk">延恩鎮</div>
      <div class="dlg-text" id="dlg-txt">歡迎來到延恩鎮！用方向鍵移動，靠近NPC後按A互動。<span class="dlg-cursor"></span></div>
      <div class="dlg-choices" id="dlg-choices"></div>
    </div>
    <div class="dpad-area">
      <div class="dpad">
        <div></div>
        <button class="dpad-btn" id="btn-up" ontouchstart="startMove('up')" ontouchend="stopMove()" onmousedown="startMove('up')" onmouseup="stopMove()">▲</button>
        <div></div>
        <button class="dpad-btn" id="btn-left" ontouchstart="startMove('left')" ontouchend="stopMove()" onmousedown="startMove('left')" onmouseup="stopMove()">◀</button>
        <button class="dpad-btn dpad-center" onclick="interact()">A</button>
        <button class="dpad-btn" id="btn-right" ontouchstart="startMove('right')" ontouchend="stopMove()" onmousedown="startMove('right')" onmouseup="stopMove()">▶</button>
        <div></div>
        <button class="dpad-btn" id="btn-down" ontouchstart="startMove('down')" ontouchend="stopMove()" onmousedown="startMove('down')" onmouseup="stopMove()">▼</button>
        <div></div>
      </div>
      <div class="act-btns">
        <div class="act-row">
          <button class="act-btn" onclick="doAction('create')"><span class="icon">🖌</span>創作<span class="eff">設計+2 心情-3</span></button>
          <button class="act-btn" onclick="doAction('draw')"><span class="icon">✏</span>繪畫<span class="eff">設計+2 心情-2</span></button>
          <button class="act-btn" onclick="doAction('daydream')"><span class="icon">💭</span>發呆<span class="eff">設計+1 心情+2</span></button>
        </div>
        <div class="act-row">
          <button class="act-btn" onclick="doAction('records')"><span class="icon">🎵</span>唱片<span class="eff">心情+1 好感+2</span></button>
          <button class="act-btn" onclick="startCombat()"><span class="icon">🔫</span>瓦羅蘭<span class="eff">戰鬥+2</span></button>
        </div>
        <button class="act-end-day" onclick="endDay()">⏩ 結束今日，進入下一天</button>
      </div>
    </div>
  </div>
</div>

<!-- STATS -->
<div id="scr-stats" class="screen">
  <div class="stats-title">★ 玩家狀態 ★</div>
  <div class="stat-row">
    <div class="stat-label">設計 <span id="s-design">10</span>/100</div>
    <div class="stat-bar"><div class="stat-fill fill-design" id="b-design" style="width:10%"></div></div>
  </div>
  <div class="stat-row">
    <div class="stat-label">社交 <span id="s-social">10</span>/100</div>
    <div class="stat-bar"><div class="stat-fill fill-social" id="b-social" style="width:10%"></div></div>
  </div>
  <div class="stat-row">
    <div class="stat-label">戰鬥 <span id="s-combat">10</span>/100</div>
    <div class="stat-bar"><div class="stat-fill fill-combat" id="b-combat" style="width:10%"></div></div>
  </div>
  <div class="stat-row">
    <div class="stat-label">心情 <span id="s-mood">50</span></div>
    <div class="stat-bar"><div class="stat-fill fill-mood" id="b-mood" style="width:66%"></div></div>
  </div>

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ============================================================
// SAVE / LOAD
// ============================================================
function saveGame() {
  const save = {
    G: JSON.parse(JSON.stringify(G)),
    ts: Date.now()
  };
  localStorage.setItem('yen_save', JSON.stringify(save));
  notify('💾 存檔成功！');
}

function loadSave() {
  const raw = localStorage.getItem('yen_save');
  if (!raw) { notify('找不到存檔', 'var(--red)'); return; }
  const save = JSON.parse(raw);
  G = save.G;
  // Merge achievements from storage
  G.achievements = JSON.parse(localStorage.getItem('yen_ach') || '[]');
  // Reset movement state to prevent stuck movement bug
  moveInterval = null;
  moveDir = null;
  startGame();
  notify('📂 讀取存檔成功！');
}

let gameLoopRunning = false;

function startGame() {
  showScreen('scr-game');
  initCanvas();
  updateNPCPositions();
  startNPCWander();
  updateHUD();
  setDlg('延恩鎮','歡迎來到延恩鎮！傑拉德路和麥基路交織在市中心。用方向鍵移動，靠近NPC後按【A】互動。');
  if (!gameLoopRunning) {
    gameLoopRunning = true;
    requestAnimationFrame(gameLoop);
  }
}

// ============================================================
// CANVAS / MAP RENDERING
// ============================================================
function initCanvas() {
  canvas = document.getElementById('map-canvas');
  const vp = document.getElementById('map-viewport');
  vpW = vp.clientWidth;
  vpH = vp.clientHeight;
  canvas.width = vpW;
  canvas.height = vpH;
  ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;
}

function gameLoop() {
  if (!document.getElementById('scr-game').classList.contains('active')) {
    gameLoopRunning = false;
    return;
  }
  updateCamera();
  drawMap();
  drawLandmarks();
  drawNPCs();
  drawPlayer();
  checkNearby();
  requestAnimationFrame(gameLoop);
}

  const px = G.player.tx * TILE + TILE/2;
  const py = G.player.ty * TILE + TILE/2;
  camX = Math.max(0, Math.min(MAP_W*TILE - vpW, px - vpW/2));
  camY = Math.max(0, Math.min(MAP_H*TILE - vpH, py - vpH/2));
}

function drawMap() {
  ctx.clearRect(0,0,vpW,vpH);
  for (let y=0; y<MAP_H; y++) {
    for (let x=0; x<MAP_W; x++) {
      const t = MAP[y][x];
      const sx = x*TILE - camX;
      const sy = y*TILE - camY;
      if (sx > vpW+TILE || sy > vpH+TILE || sx < -TILE || sy < -TILE) continue;

      // Base tile
      ctx.fillStyle = TILE_COLORS[t];
      ctx.fillRect(sx, sy, TILE, TILE);

      // Grid lines for roads
      if (t === T.ROAD) {
        ctx.strokeStyle = 'rgba(100,100,160,0.2)';
        ctx.strokeRect(sx, sy, TILE, TILE);
        // dashes
        ctx.fillStyle = 'rgba(255,220,50,0.15)';
        if (x > 0 && MAP[y][x-1] === T.ROAD) ctx.fillRect(sx+TILE/2-1, sy+TILE/2-1, 2, 2);
      }
      if (t === T.PARK) {
        // Radish sprites
        ctx.fillStyle = '#4a9a33';
        ctx.fillRect(sx+4, sy+4, 6, 8);
        ctx.fillStyle = '#f0f0f0';
        ctx.fillRect(sx+5, sy+10, 4, 8);
      }
      if (t === T.POND) {
        // Animated water shimmer
        const t2 = Date.now()/1000;
        ctx.fillStyle = `rgba(50,120,200,${0.4+Math.sin(t2+x*0.5+y)*0.2})`;
        ctx.fillRect(sx+2, sy+2, TILE-4, TILE-4);
        // lily pad
        if ((x+y)%3===0) { ctx.fillStyle='#2a6a2a'; ctx.fillRect(sx+8,sy+8,8,6); }
      }
    }
  }

  // Road labels
  ROAD_LABELS.forEach(rl => {
    const sx = rl.tx*TILE - camX;
    const sy = rl.ty*TILE - camY;
    ctx.font = '7px "Press Start 2P", monospace';
    ctx.fillStyle = 'rgba(200,200,120,0.7)';
    ctx.fillText(rl.text, sx, sy+12);
  });

  // Night overlay
  if (G.phase === 2) {
    ctx.fillStyle = 'rgba(0,0,20,0.45)';
    ctx.fillRect(0,0,vpW,vpH);
  } else if (G.phase === 1) {
    ctx.fillStyle = 'rgba(60,40,0,0.2)';
    ctx.fillRect(0,0,vpW,vpH);
  }

  // Weather overlay
  if (G.weather === 'storm') {
    ctx.fillStyle = 'rgba(0,0,30,0.22)';
    ctx.fillRect(0,0,vpW,vpH);
  } else if (G.weather === 'cloudy') {
    ctx.fillStyle = 'rgba(10,10,20,0.10)';
    ctx.fillRect(0,0,vpW,vpH);
  }

  // Rain drops animation
  if (G.weather === 'drizzle' || G.weather === 'storm') {
    const dropCount = G.weather === 'storm' ? 55 : 22;
    const t3 = (Date.now()/80) % vpH;
    ctx.strokeStyle = G.weather === 'storm' ? 'rgba(160,190,255,0.55)' : 'rgba(160,190,255,0.28)';
    ctx.lineWidth = G.weather === 'storm' ? 1.5 : 1;
    for (let i=0; i<dropCount; i++) {
      const rx = (i*137.5) % vpW;
      const ry = (i*89.3 + t3) % vpH;
      ctx.beginPath();
      ctx.moveTo(rx, ry);
      ctx.lineTo(rx - 1, ry + 9);
      ctx.stroke();
    }
  }
}

function drawLandmarks() {
  LANDMARKS.forEach(lm => {
    const sx = lm.tx*TILE - camX;
    const sy = lm.ty*TILE - camY;
    if (sx > vpW+TILE*2 || sy > vpH+TILE*2 || sx < -TILE*2 || sy < -TILE*2) return;

    // 張雅塘 landmark is drawn 4x bigger
    const isPond = lm.id === 'pond';
    const size = isPond ? TILE*4 : TILE;
    const offsetX = isPond ? -TILE*1.5 : 0;
    const offsetY = isPond ? -TILE*1.5 : 0;

    // Building background
    ctx.fillStyle = lm.color + '44';
    ctx.fillRect(sx+offsetX-2, sy+offsetY-2, size+4, size+4);
    ctx.strokeStyle = lm.color;
    ctx.lineWidth = isPond ? 3 : 2;
    ctx.strokeRect(sx+offsetX-2, sy+offsetY-2, size+4, size+4);

    // Icon (emoji)
    ctx.font = isPond ? '48px sans-serif' : '18px sans-serif';
    ctx.fillText(lm.icon, sx+offsetX+size/2-20, sy+offsetY+size/2+12);

    // Label
    ctx.font = '6px "Press Start 2P", monospace';
    ctx.fillStyle = '#ffffc0';
    const tl = lm.label;
    ctx.fillText(tl.substring(0,6), sx+offsetX-4, sy+offsetY-6);
  });
}

function drawNPCs() {
  Object.entries(G.npcPos).forEach(([id, pos]) => {
    const def = NPC_DEFS[id];
    if (!def) return;
    const sx = pos.tx*TILE - camX;
    const sy = pos.ty*TILE - camY;
    if (sx > vpW+64 || sy > vpH+64 || sx < -64 || sy < -64) return;

    // Special: raicho 雷鳥 draws as a pixel thunderbird
    if (id === 'raicho') {
      const fx = sx + TILE/2 - 8;
      const fy = sy + TILE/2 - 6;
      // Body
      ctx.fillStyle = '#ffdd44';
      ctx.fillRect(fx, fy+2, 16, 10);
      // Wing tips
      ctx.fillStyle = '#cc8800';
      ctx.fillRect(fx-4, fy+4, 6, 5);
      ctx.fillRect(fx+14, fy+4, 6, 5);
      // Head
      ctx.fillStyle = '#ffee88';
      ctx.fillRect(fx+5, fy-3, 7, 7);
      // Beak
      ctx.fillStyle = '#ff8800';
      ctx.fillRect(fx+12, fy, 3, 2);
      // Eye
      ctx.fillStyle = '#000';
      ctx.fillRect(fx+8, fy-1, 2, 2);
      // Lightning bolt decoration
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(fx+3, fy+4, 2, 4);
      ctx.fillRect(fx+5, fy+6, 2, 4);
      // Name
      ctx.font = '6px "Press Start 2P", monospace';
      ctx.fillStyle = '#ffdd44';
      ctx.fillText('雷鳥', fx+1, fy-6);
      return;
    }
    if (id === 'kotsu') {
      const fx = sx + TILE/2 - 6;
      const fy = sy + TILE/2 - 4;
      ctx.fillStyle = '#22cc44';
      ctx.fillRect(fx, fy, 12, 8);
      ctx.fillStyle = '#118833';
      ctx.fillRect(fx-2, fy+4, 4, 4);
      ctx.fillRect(fx+10, fy+4, 4, 4);
      ctx.fillStyle = '#fff';
      ctx.fillRect(fx+2, fy+1, 2, 2);
      ctx.fillRect(fx+8, fy+1, 2, 2);
      ctx.font = '6px "Press Start 2P", monospace';
      ctx.fillStyle = '#22cc44';
      ctx.fillText('高捷蛙', fx-4, fy-3);
      return;
    }

    // Pixel character
    const px = sx + TILE/2 - 7;
    const py = sy + TILE/2 - 14;

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(px+2, py+26, 12, 4);

    // Head
    ctx.fillStyle = def.color;
    ctx.fillRect(px+2, py, 10, 9);
    // Eyes
    ctx.fillStyle = '#000';
    ctx.fillRect(px+4, py+3, 2, 2);
    ctx.fillRect(px+8, py+3, 2, 2);
    // Body
    ctx.fillStyle = def.bodyColor;
    ctx.fillRect(px, py+9, 14, 10);
    // Legs
    ctx.fillStyle = def.bodyColor;
    ctx.fillRect(px+1, py+19, 5, 7);
    ctx.fillRect(px+8, py+19, 5, 7);

    // Name tag
    ctx.font = '6px "Press Start 2P", monospace';
    ctx.fillStyle = '#f7d94c';
    const lw = ctx.measureText(def.name).width;
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(px + 7 - lw/2 - 2, py - 12, lw + 4, 10);
    ctx.fillStyle = '#f7d94c';
    ctx.fillText(def.name, px + 7 - lw/2, py - 4);

    // Port-ge sighing animation
    if (id === 'gangge') {
      const t2 = Date.now()/1000;
      if (Math.sin(t2*0.8) > 0.7) {
        ctx.font = '10px sans-serif';
        ctx.fillText('...', px+14, py-10);
      }
    }
  });
}

function drawPlayer() {
  const px2 = G.player.tx*TILE - camX + TILE/2 - 8;
  const py2 = G.player.ty*TILE - camY + TILE/2 - 14;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(px2+2, py2+26, 12, 4);

  // Body
  const bob = Math.sin(Date.now()/200) * 1.5 * (moveDir ? 1 : 0);
  ctx.fillStyle = '#f5d080'; // head
  ctx.fillRect(px2+2, py2+bob, 10, 9);
  // Eyes based on dir
  ctx.fillStyle = '#000';
  if (G.player.dir===0||G.player.dir===2||G.player.dir===3) {
    ctx.fillRect(px2+4, py2+3+bob, 2, 2);
    ctx.fillRect(px2+8, py2+3+bob, 2, 2);
  }
  // Body
  ctx.fillStyle = '#5566dd';
  ctx.fillRect(px2, py2+9+bob, 14, 10);
  // Legs
  const legL = Math.sin(Date.now()/150)*3;
  ctx.fillStyle = '#3344aa';
  ctx.fillRect(px2+1, py2+19+bob+legL, 5, 7);
  ctx.fillRect(px2+8, py2+19+bob-legL, 5, 7);

  // "You" label
  ctx.font = '6px "Press Start 2P", monospace';
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(px2-2, py2-12, 18, 10);
  ctx.fillStyle = '#60d0ff';
  ctx.fillText('YOU', px2+1, py2-4);
}

// ============================================================
// MOVEMENT
// ============================================================
function startMove(dir) {
  if (moveInterval) return;
  moveDir = dir;
  moveOnce(dir);
  moveInterval = setInterval(() => moveOnce(dir), 150);
}
function stopMove() {
  clearInterval(moveInterval);
  moveInterval = null;
  moveDir = null;
}

function moveOnce(dir) {
  let nx = G.player.tx, ny = G.player.ty;
  if (dir === 'up') { ny--; G.player.dir=1; }
  else if (dir === 'down') { ny++; G.player.dir=0; }
  else if (dir === 'left') { nx--; G.player.dir=2; }
  else if (dir === 'right') { nx++; G.player.dir=3; }

  if (nx < 0 || nx >= MAP_W || ny < 0 || ny >= MAP_H) return;
  const tile = MAP[ny][nx];
  if (tile === T.BUILDING || tile === T.WATER) return; // can't walk into buildings or deep water
  G.player.tx = nx;
  G.player.ty = ny;
  updateLocationBadge();
}

document.addEventListener('keydown', e => {
  const m = {ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right'};
  if (m[e.key]) { e.preventDefault(); startMove(m[e.key]); }
  if (e.key === ' ' || e.key === 'z' || e.key === 'Z') interact();
});
document.addEventListener('keyup', e => {
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) stopMove();
});

function updateLocationBadge() {
  // Find nearest landmark
  let nearest = null, minD = 999;
  LANDMARKS.forEach(lm => {
    const d = Math.abs(lm.tx - G.player.tx) + Math.abs(lm.ty - G.player.ty);
    if (d < minD) { minD = d; nearest = lm; }
  });
  const badge = document.getElementById('loc-badge');
  if (nearest && minD <= 3) badge.textContent = nearest.label;
  else badge.textContent = '延恩鎮';
}

function updateNPCPositions() {
  // 陣恩延 - random position, night → studio more likely
  const isNight = G.phase === 2;
  if (isNight && Math.random() < 0.6) {
    G.npcPos.zhen = { tx:5, ty:7 }; // studio
  } else {
    const opts = NPC_DEFS.zhen.defaultPositions;
    const pick = opts[Math.floor(Math.random()*opts.length)];
    G.npcPos.zhen = { tx:pick[0], ty:pick[1] };
  }

  // 679 - work hours at konbini
  const dow = G.dow, hour = G.phase;
  if (dow === 2) {
    G.npcPos.n679 = { tx: 4+Math.floor(Math.random()*20), ty:6 };
  } else if (hour === 0 || hour === 1) {
    G.npcPos.n679 = { tx:19, ty:16 };
  } else {
    G.npcPos.n679 = { tx: 5+Math.floor(Math.random()*18), ty:5+Math.floor(Math.random()*18) };
    let attempts = 0;
    while (MAP[G.npcPos.n679.ty] && MAP[G.npcPos.n679.ty][G.npcPos.n679.tx] === T.BUILDING && attempts < 20) {
      G.npcPos.n679.tx = 5+Math.floor(Math.random()*18);
      G.npcPos.n679.ty = 5+Math.floor(Math.random()*18);
      attempts++;
    }
  }

  // 高捷蛙 - 10% chance to spawn on road each turn
  if (Math.random() < 0.10) {
    const roadTiles = [];
    for (let ry=1; ry<MAP_H-1; ry++) for (let rx=1; rx<MAP_W-1; rx++) {
      if (MAP[ry][rx] === T.ROAD) roadTiles.push([rx,ry]);
    }
    const pick = roadTiles[Math.floor(Math.random()*roadTiles.length)];
    G.npcPos.kotsu = { tx:pick[0], ty:pick[1] };
  } else {
    delete G.npcPos.kotsu;
  }

  // 雷鳥 - 20% chance to spawn on road each turn
  if (Math.random() < 0.20) {
    const roadTiles = [];
    for (let ry=1; ry<MAP_H-1; ry++) for (let rx=1; rx<MAP_W-1; rx++) {
      if (MAP[ry][rx] === T.ROAD) roadTiles.push([rx,ry]);
    }
    const pick = roadTiles[Math.floor(Math.random()*roadTiles.length)];
    G.npcPos.raicho = { tx:pick[0], ty:pick[1] };
  } else {
    delete G.npcPos.raicho;
  }
}

function startNPCWander() {
  setInterval(() => {
    // 港哥 wanders in center plaza area
    const gg = G.npcPos.gangge;
    if (!gg) return;
    const dirs = [[0,1],[0,-1],[1,0],[-1,0],[0,0],[0,0]];
    const d = dirs[Math.floor(Math.random()*dirs.length)];
    const nx = Math.max(5, Math.min(14, gg.tx + d[0]));
    const ny = Math.max(1, Math.min(6, gg.ty + d[1]));
    if (MAP[ny] && MAP[ny][nx] !== T.BUILDING) {
      gg.tx = nx; gg.ty = ny;
    }
  }, 1200);
}

// PROXIMITY / INTERACT
// ============================================================
function checkNearby() {
  nearbyNPC = null;
  const px = G.player.tx, py = G.player.ty;
  const prompt = document.getElementById('interact-prompt');

  // Check NPCs
  const npcs = Object.entries(G.npcPos);
  for (const [id, pos] of npcs) {
    const d = Math.abs(pos.tx-px) + Math.abs(pos.ty-py);
    if (d <= 1) { nearbyNPC = id; break; }
  }

  // Check landmarks (pond gets extra radius because it's big)
  let nearLM = null;
  LANDMARKS.forEach(lm => {
    const radius = lm.id === 'pond' ? 4 : 2;
    const d = Math.abs(lm.tx-px) + Math.abs(lm.ty-py);
    if (d <= radius) nearLM = lm;
  });

  if (nearbyNPC || nearLM) {
    const name = nearbyNPC ? (NPC_DEFS[nearbyNPC]?.name || nearbyNPC) : (nearLM?.label || '');
    const sx = (nearbyNPC ? G.npcPos[nearbyNPC].tx : nearLM.tx)*TILE - camX;
    const sy = (nearbyNPC ? G.npcPos[nearbyNPC].ty : nearLM.ty)*TILE - camY;
    prompt.style.display = 'block';
    prompt.style.left = Math.max(4, Math.min(vpW-100, sx)) + 'px';
    prompt.style.top = Math.max(4, sy - 20) + 'px';
    prompt.textContent = '▲ ' + name;
    if (!nearbyNPC) nearbyNPC = '__lm__' + nearLM.id;
  } else {
    prompt.style.display = 'none';
  }
}

function interact() {
  if (!nearbyNPC) return;
  stopMove(); // stop movement when opening dialogue to prevent stuck-moving bug
  if (nearbyNPC === 'zhen') interactZhen();
  else if (nearbyNPC === 'gangge') interactGangGe();
  else if (nearbyNPC === 'n679') interact679();
  else if (nearbyNPC === 'rong') interactRong();
  else if (nearbyNPC === 'kuma') interactKuma();
  else if (nearbyNPC === 'kotsu') interactKotsu();
  else if (nearbyNPC === 'raicho') interactRaicho();
  else if (nearbyNPC.startsWith('__lm__')) {
    const lmId = nearbyNPC.replace('__lm__','');
    interactLandmark(lmId);
  }
}

// ============================================================
// ACTIONS
// ============================================================
function useAction() {
  if (G.actLeft <= 0) { notify('今天行動已用完！','var(--red)'); return false; }
  G.actLeft--;
  if (G.actLeft === 2) G.phase = 0;
  if (G.actLeft === 1) G.phase = 1;
  if (G.actLeft === 0) G.phase = 2;
  updateHUD();
  checkGangGeSurprise();
  return true;
}

function doAction(type) {
  if (!useAction()) return;
  G.actToday.push(type);

  switch(type) {
    case 'create':
      G.consecutiveCreate++;
      changeStat('design', 2); changeStat('mood', -3);
      setDlg('創作基礎','你埋頭練習創作基礎。\n進步是有的，但有點心累...');
      notify('+設計2 -心情3','var(--pink)');
      break;
    case 'draw':
      changeStat('design', 2); changeStat('mood', -2);
      setDlg('設計繪畫','你認真繪畫，線條越來越有力量。\n但大腦開始疲憊了。');
      notify('+設計2 -心情2','var(--pink)');
      break;
    case 'daydream':
      G.consecutiveCreate = 0;
      changeStat('design', 1); changeStat('mood', 2);
      setDlg('發呆思考','你望著窗外蘿蔔發呆，靈感悄悄浮現。');
      notify('+設計1 +心情2','var(--green)');
      break;
    case 'records':
      G.consecutiveCreate = 0;
      changeStat('mood', 1); changeStat('favor', 2);
      if (G.actToday.filter(a=>a==='records').length >= 3) {
        changeStat('favor', -1);
        setDlg('唱片行','又是周杰倫...你有點聽膩了。\n好感度稍微下降。');
      } else {
        setDlg('唱片行','你在唱片行聽歌，心情不錯。');
      }
      notify('+心情1 +好感2','var(--accent)');
      break;
    case 'commission': {
      G.consecutiveCreate = 0;
      if (G.design < 30) {
        setDlg('接委託', '你嘗試接設計委託...\n但系統顯示：\n「需要繪圖技能30以上才能開啟委託功能」\n先好好練習吧！');
        G.actLeft++; G.phase = Math.max(0, G.phase-1); // refund action
        updateHUD();
        return;
      }
      const commSuccess = G.design < 50
        ? Math.random() < 0.50
        : Math.random() < 0.70;
      const commGain = G.design < 50 ? 200 : 500;
      const commDesignUp = 1;
      if (commSuccess) {
        changeStat('money', commGain);
        changeStat('design', commDesignUp);
        if (G.design < 50) {
          setDlg('接委託（初級）', `你完成了一份設計委託！\n客戶看起來很滿意。\n\n+$${commGain}，繪圖技能+${commDesignUp}`);
        } else {
          setDlg('接委託（進階）', `你完成了一份高級設計委託！\n客戶讚不絕口，報酬相當豐厚。\n\n+$${commGain}，繪圖技能+${commDesignUp}`);
        }
        notify(`+$${commGain} 委託成功！`, 'var(--green)');
      } else {
        changeStat('mood', -3);
        setDlg('接委託（失敗）', '你努力完成委託，但客戶不太滿意...\n「感謝您的參與，但這次不符合需求。」\n\n沒有獲得報酬，心情有點沮喪。\n心情-3');
        notify('委託失敗 -心情3', 'var(--red)');
      }
      break;
    }
    case 'art40Work':
      G.consecutiveCreate = 0;
      changeStat('money', 100);
      changeStat('design', 1);
      setDlg('40號美術社打工', '你在40號美術社幫忙整理商品、招待客人。\n老闆給了你薪水，還傳授了一些美術知識！\n\n+$100，繪圖技能+1\n（消耗3點行動值）');
      notify('+$100 +設計1（打工！）', 'var(--green)');
      break;
  }
  checkEndingConditions();
  updateHUD();
}

function pondFish(isMainPond = true) {
  stopMove(); // prevent movement lock after dialogue
  if (!useAction()) return;
  G.fishCount++;
  const roll = Math.random();
  let txt = '';

  if (roll < 0.30) {
    txt = '你靜靜地等待...\n什麼都沒上鉤。\n池面只有漣漪。';
  } else if (roll < 0.35) {
    // 青蛙 - 只有張雅塘能釣到高捷蛙
    if (isMainPond && Math.random() < 0.55) {
      G.frogCount++;
      changeStat('mood',-1); changeStat('design',2);
      txt = '你釣到了傳說中的「高捷蛙」！\n牠瞪著你，然後用力跳走了。\n心情有點低落，但獲得了設計靈感！';
      notify('-心情1 +設計2（高捷蛙！）','var(--pink)');

  g.onclick = () => giveToZhen(slot.id);

function addItem(id, count) {
  const ex = G.inventory.find(i => i.id === id);
  if (ex) ex.count += count;
  else G.inventory.push({ id, count });
}

function removeItem(id, count=1) {
  const ex = G.inventory.find(i => i.id === id);
  if (!ex || ex.count < count) return false;
  ex.count -= count;
  if (ex.count <= 0) G.inventory = G.inventory.filter(i => i.id !== id);
  return true;
}

function useItemFromInv(id, cb) {
  if (!removeItem(id)) { notify('背包裡沒有' + (ITEMS_DB[id]?.name || id) + '！','var(--red)'); return; }
  cb();
  renderInv();
}

function useItemDirect(id) {
  if (!removeItem(id)) { notify('沒有了！','var(--red)'); return; }
  const item = ITEMS_DB[id] || {};
  if (item.moodUp) changeStat('mood', item.moodUp);
  if (item.fullUp) {
    G.fullness = Math.min(6, G.fullness + item.fullUp);
    notify(`飽腹+${item.fullUp}（${G.fullness.toFixed(1)}/6）`, 'var(--green)');
  }
  if (id === 'pen') changeStat('design', 1);
  if (id === 'watercolor') { changeStat('design', 2); changeStat('mood', 1); }
  if (id === 'canvas') { changeStat('design', 3); }
  if (id === 'charcoal') { changeStat('design', 1); }
  if (id === 'palette') { changeStat('design', 2); }
  if (id === 'ink') { changeStat('design', 1); changeStat('mood', 1); }
  if (id === 'sketchbook') { changeStat('design', 2); changeStat('mood', 1); }
  if (id === 'blackpaint') { changeStat('mood', 1); setDlg('擼黑皮','你把黑皮塗料塗在紙上，用手指輕輕擼過...\n不知道為何，壓力消失了。心情+1'); notify('+心情1（擼黑皮！）','var(--accent)'); renderInv(); updateHUD(); return; }
  if (id === 'tablet') { changeStat('design', 4); changeStat('mood', 10); }
  if (id === 'ptablet') { changeStat('design', 3); changeStat('mood', 5); }
  if (id === 'portable') changeStat('mood', 3);
  if (id === 'sniper') changeStat('combat', 4);
  if (id === 'methanol') {
    changeStat('mood', -20);
    if (G.mood <= -50) { unlockAch('drunk_die'); triggerEnding('bad_player'); }
  }
  if (id === 'vodka') { changeStat('mood', 8); }
  if (id === 'kumaFood') { setDlg('Kuma神祕料理','你吃了Kuma的神祕料理...\n味道奇妙，但心情變好了！\n心情+1 飽腹+0.5'); }
  if (!item.fullUp) notify('使用了' + (item.name||id),'var(--accent)');
  else if (!id.includes('kuma')) notify('使用了' + (item.name||id),'var(--accent)');
  renderInv();
  updateHUD();
}

function giveToZhen(id) {
  if (!removeItem(id)) { notify('背包裡沒有了！','var(--red)'); return; }
  const item = ITEMS_DB[id] || {};
  let favDelta = item.favorUp || 0;
  let resp = '';

  if (id === 's_rice') { favDelta=5; resp='陣恩延：「這才是真正的肉燥飯！你懂我！」'; }
  else if (id === 'n_rice') { favDelta=-2; resp='陣恩延：「你根本不懂真正的食物。」'; }
  else if (id === 'noodle') { favDelta=-10; resp='陣恩延：「你是腦袋需要重製嗎？台北人品味都那麼差嗎？」'; }
  else if (id === 'methanol') { changeStat('zMood',-15); favDelta=-5; resp='陣恩延喝了一口...「這味道...不對勁！」\n精神陷入混亂！'; }
  else if (id === 'vodka') { changeStat('zMood', Math.random()<0.5?10:-5); favDelta=10; resp='陣恩延喝了伏特加，精神陷入隨機混亂...\n陣恩延表情變得奇怪起來。'; }
  else if (id === 'tablet') { favDelta=5; resp='陣恩延：「液晶繪圖板！？你這是...謝謝。」\n眼神裡有了不一樣的光芒。'; }
  else if (id === 'feather') { favDelta=3; resp='陣恩延：「夜露的羽毛？...謝謝你。」'; }
  else if (item.favorUp) resp = '陣恩延收下了'+item.name+'，點了點頭。';
  else resp = '陣恩延收下了'+item.name+'。';

  changeStat('favor', favDelta);
  setDlg('陣恩延', resp);
  notify((favDelta>=0?'+':'') + '好感' + favDelta, favDelta>=0?'var(--pink)':'var(--red)');
  renderInv();
  showScreen('scr-game');
  checkEndingConditions();
}

function changeStat(stat, amount) {
  if (stat === 'money') G.money = Math.max(0, G.money + amount);
  else if (stat === 'design') G.design = Math.max(0, Math.min(100, G.design + amount));
  else if (stat === 'social') G.social = Math.max(0, Math.min(100, G.social + amount));
  else if (stat === 'combat') G.combat = Math.max(0, Math.min(100, G.combat + amount));
  else if (stat === 'mood') {
    // Apply weather modifier to positive mood gains
    let adj = amount;
    if (amount > 0 && G.weatherMoodMod < 0) {
      adj = Math.max(0, amount + G.weatherMoodMod);
    }
    G.mood = Math.max(-50, Math.min(100, G.mood + adj));
  }
  else if (stat === 'zMood') G.zMood = Math.max(-50, Math.min(100, G.zMood + amount));
  else if (stat === 'favor') G.favor = Math.max(-100, Math.min(100, G.favor + amount));
  updateHUD();
  checkDeathConditions();
}

function updateHUD() {
  document.getElementById('hud-day').textContent = '第'+G.day+'天 '+DAYS[G.dow]+' '+TIMES[G.phase];
  document.getElementById('hud-money').textContent = '💰$'+G.money;
  const actMax = G.actLeft <= 3 ? 3 : G.actLeft;
  document.getElementById('hud-acts').textContent = '♦'.repeat(Math.max(0,G.actLeft))+'♢'.repeat(Math.max(0,3-G.actLeft))+' x'+G.actLeft;
  const wi = (WEATHER_ICON && WEATHER_ICON[G.weather]) || '☀';
  document.getElementById('time-badge').textContent = wi+' '+TIMES[G.phase]+' 飽:'+G.fullness.toFixed(1)+'/3';
}

function checkDeathConditions() {
  if (G.mood <= -50) triggerEnding('bad_player');
  if (G.zMood <= -50) triggerEnding('bad_zhen');
}

function checkEndingConditions() {
  if (G.design >= 100 && G.statueUses >= 5) triggerEnding('trueA');
  if (G.gameCount >= 20) triggerEnding('trueC');
  if (G.shop679 >= 10) triggerEnding('trueB');
  if (G.favor >= 80 && G.day >= 8 && Math.random() < 0.25) triggerEnding('good');
}

// ============================================================
// END DAY
// ============================================================
function rollWeather() {
  const r = Math.random();
  if (r < 0.50) {
    // Rain 50%
    const r2 = Math.random();
    if (r2 < 0.70) {
      G.weather = 'drizzle';
      G.weatherMoodMod = -0.5;
    } else {
      G.weather = 'storm';
      G.weatherMoodMod = -1;
    }
  } else if (r < 0.80) {
    G.weather = 'sunny';
    G.weatherMoodMod = 0;
  } else {
    G.weather = 'cloudy';
    G.weatherMoodMod = 0;
  }
}

const WEATHER_ICON = { sunny:'☀', cloudy:'☁', drizzle:'🌧', storm:'⛈' };
const WEATHER_NAME = { sunny:'晴天', cloudy:'陰天', drizzle:'毛毛雨', storm:'大雷雨' };

function endDay() {
  // Fullness check - flat -10 if below 3
  if (G.fullness < 3) {
    changeStat('mood', -10);
    notify(`⚠ 今日飽腹不足（${G.fullness.toFixed(1)}/3）！心情-10`, 'var(--red)');
  }
  // Overeating penalty
  const overeatPenalty = G.fullness > 5;

  G.day++;
  G.dow = (G.dow % 7) + 1;
  G.phase = 0;
  G.actLeft = overeatPenalty ? 2 : 3;
  G.actToday = [];
  G.daysSinceZhen++;
  G.fullness = 0; // reset daily fullness

  // Roll weather for new day
  rollWeather();

  // Daily income $300
  changeStat('money', 300);
  notify('📅 新的一天！領取了 $300 日常經費', 'var(--green)');

  if (G.daysSinceZhen >= 3) {
    changeStat('favor', -10);
    changeStat('zMood', -5);
    notify('⚠ 已3天沒找陣恩延！好感大降！','var(--red)');
    setTimeout(() => setDlg('陣恩延（訊息）','陣恩延傳來訊息：\n「...你根本不在乎我吧。」\n好感度-10，陣恩延心情-5'), 1000);
  }

  changeStat('mood', 1);
  updateNPCPositions();
  updateHUD();
  checkDailyEvents();
  checkRandomRoadEncounter();

  let msg = `第${G.day}天，${DAYS[G.dow]}。\n`;
  msg += `今日天氣：${WEATHER_ICON[G.weather]} ${WEATHER_NAME[G.weather]}`;
  if (G.weather === 'drizzle') msg += '（行動心情效果-0.5）';
  if (G.weather === 'storm') msg += '（行動心情效果-1）';
  msg += '\n';
  if (overeatPenalty) msg += '⚠ 昨天吃太多了！今日行動值-1\n';
  if (G.dow === 2) msg += '⚠ 今天是週二，超商公休！679變成風滾草了！\n';
  if (G.dow === 1) msg += '★ 今天是週一！超商有i珍食便當65折！\n';
  msg += '今日飽腹度需求：3\n記得吃東西！';
  setDlg('延恩鎮', msg);
}

function checkRandomRoadEncounter() {
  const roll = Math.random();
  if (roll < 0.25) {
    // 小牌、小七、夜露 random encounters
    const encounters = [
      { name:'小牌', icon:'🪪', line:'小牌在路邊悠閒地溜達，見到你朝你揮了揮手。\n「嗨！」' },
      { name:'小七', icon:'7️⃣', line:'小七提著便利商店袋子從路邊走過，\n「喔！你也在這裡！」他打了個招呼。' },
      { name:'夜露', icon:'🌙', line:'夜露靜靜地站在路燈下，見到你微微一笑。\n「今晚的夜色真好。」', bonus:'feather' },
    ];
    const enc = encounters[Math.floor(Math.random()*encounters.length)];
    setTimeout(() => {
      changeStat('mood', 1);
      let extraTxt = '';
      if (enc.bonus) {
        addItem(enc.bonus, 1);
        extraTxt = '\n夜露輕輕遞給你一根羽毛...獲得夜露羽毛！';
      }
      setDlg(enc.name + '（路上偶遇）', enc.line + extraTxt + '\n\n心情+1');
      notify('+心情1（偶遇' + enc.name + '！）','var(--pink)');
    }, 1200);
  }
}

// ============================================================
// COMBAT
// ============================================================
function startCombat() {
  showScreen('scr-combat');
  const enemies = [
    { name:'路邊混混', hp:60, atk:8, boss:false },
    { name:'設計系大四生', hp:80, atk:12, boss:false },
    { name:'瓦羅蘭排位敵人', hp:100, atk:15, boss:false },
    { name:'BOSS: 傑拉德路守衛', hp:150, atk:20, boss:true },
  ];
  const isBoss = G.combat >= 70 && Math.random() < 0.3;
  const e = isBoss ? enemies[3] : enemies[Math.floor(Math.random()*3)];
  cState = {
    php: 100+G.combat, pmax: 100+G.combat,
    ehp: e.hp, emax: e.hp,
    eatk: e.atk, ename: e.name, boss: e.boss
  };
  document.getElementById('c-enemy-lbl').textContent = e.name;
  document.getElementById('c-ehp-blk').querySelector('.hp-fill').id = 'c-ehp';
  updateCombatHUD();
  document.getElementById('c-log').textContent = '戰鬥開始！對手是【'+e.name+'】！\n';
}

function updateCombatHUD() {
  const pp = cState.php/cState.pmax*100;
  const ep = cState.ehp/cState.emax*100;
  document.getElementById('c-php').style.width = Math.max(0,pp)+'%';
  document.getElementById('c-ehp').style.width = Math.max(0,ep)+'%';
  document.getElementById('c-php-txt').textContent = cState.php+'/'+cState.pmax;
  document.getElementById('c-ehp-txt').textContent = cState.ehp+'/'+cState.emax;
}

function cLog(msg) {
  const log = document.getElementById('c-log');
  log.textContent += msg + '\n';
  log.scrollTop = log.scrollHeight;
}

function cAct(type) {
  if (cState.ehp <= 0 || cState.php <= 0) return;
  let dmg = 0, dodged = false;

  if (type === 'attack') {
    dmg = Math.floor((10+G.combat*0.3)*(0.8+Math.random()*0.4));
    cLog('🔫 射擊！造成'+dmg+'傷害！');
  } else if (type === 'dodge') {
    dodged = Math.random() < 0.65;
    cLog(dodged ? '💨 成功閃避！' : '💨 閃避失敗！');
  } else if (type === 'snipe') {
    if (Math.random() < 0.6) {
      dmg = Math.floor((25+G.combat*0.5)*(0.9+Math.random()*0.2));
      cLog('🎯 狙擊命中！爆擊'+dmg+'！');
    } else cLog('🎯 狙擊未命中...');
  } else if (type === 'retreat') {
    changeStat('mood',-2); changeStat('combat',1);
    setDlg('撤退','你選擇撤退，獲得一點戰鬥經驗。\n戰鬥+1 心情-2');
    showScreen('scr-game'); return;
  }

  cState.ehp = Math.max(0, cState.ehp - dmg);
  updateCombatHUD();

  if (cState.ehp <= 0) {
    cLog('🏆 勝利！');
    changeStat('combat',2); changeStat('mood',2);
    if (cState.boss) { unlockAch('valo_win'); }
    G.gameCount++;
    setTimeout(()=>{
      setDlg('勝利','你贏得了這場對決！\n'+(cState.boss?'✦ 成就解鎖：你也是瓦學妹？':''));
      showScreen('scr-game'); updateHUD();
    },1000);
    if (G.gameCount >= 20) triggerEnding('trueC');
    return;
  }

  if (!dodged) {
    const ed = Math.floor(cState.eatk*(0.7+Math.random()*0.6));
    cState.php = Math.max(0, cState.php - ed);
    cLog('💥 '+cState.ename+'攻擊！受到'+ed+'傷害！');
    updateCombatHUD();
    if (cState.php <= 0) {
      cLog('💀 被擊敗了...');
      changeStat('mood',-3);
      setTimeout(()=>{ setDlg('失敗','你在這場戰鬥中落敗了... 心情-3'); showScreen('scr-game'); updateHUD(); },1000);
    }
  }
}

// ============================================================

  const et = document.getElementById('end-title');
  const ed = document.getElementById('end-text');

  if (type === 'bad_player') {
    et.textContent = 'BAD END'; et.style.color = 'var(--red)';
    ed.textContent = '你的心情跌至谷底，再也無法面對延恩鎮的一切...\n\n延恩鎮依舊靜靜矗立，蘿蔔繼續在傑拉德路旁生長。';
  } else if (type === 'bad_zhen') {
    et.textContent = 'BAD END'; et.style.color = 'var(--red)';
    ed.textContent = '陣恩延的精神狀態崩潰，從你的生活中消失了。\n\n你一個人站在市中心廣場，傑拉德威雕像無聲地注視著你。';
  } else if (type === 'good') {
    et.textContent = 'GOOD END ♥'; et.style.color = 'var(--pink)';
    ed.textContent = '陣恩延對著你微笑：「你知道嗎...我喜歡你。」\n\n在延恩鎮，傑拉德威雕像見證了你們的相遇。\n教堂的Techno聖歌聲中，你們在市中心廣場攜手同行。\n\n這是屬於你們的延恩鎮故事。';
    unlockAch('good_end');
  } else if (type === 'trueA') {
    et.textContent = 'TRUE END A ★'; et.style.color = 'var(--accent)';
    ed.textContent = '港哥一次又一次說著「醜」，每一次你都咬牙重新來過。\n\n設計技能達到頂點的那天，你看清了延恩鎮，也看清了設計的本質。\n\n你收拾行囊，離開了延恩鎮。\n\n多年後，你成為獨當一面的設計師。\n偶爾回想起傑拉德路上的蘿蔔，和那座真理之口石像。\n\n「醜」——那個字，竟成了你一生的動力。';
    unlockAch('true_a');
  } else if (type === 'trueB') {
    et.textContent = 'TRUE END B 🏪'; et.style.color = 'var(--green)';
    ed.textContent = '679突然說：\n「欸，我們超商缺人手，你要來上班嗎？」\n\n就這樣，你成為了超商的一員。\n周二，你和679一起變成風滾草。\n周一，你們一起賣打折i珍食便當。\n\n成就：「超商之神」';
    unlockAch('true_b');
  } else if (type === 'trueC') {
    et.textContent = 'TRUE END C 🎮'; et.style.color = 'var(--border)';
    ed.textContent = '你一整天只剩下打遊戲。\n\n瓦羅蘭的世界比延恩鎮更真實，\n螢幕的光芒比教堂的Techno聖歌更動人。\n\n成就：「電競仔」\n\n陣恩延偶爾還是會發訊息...\n但你已經很久沒有回覆了。';
    unlockAch('true_c');
  }
}

// ============================================================
// DIALOGUE HELPER
// ============================================================
function setDlg(speaker, text, choices) {
  document.getElementById('dlg-spk').textContent = speaker;
  document.getElementById('dlg-txt').innerHTML = (text||'').replace(/\n/g,'<br>') + '<span class="dlg-cursor"></span>';
  const dc = document.getElementById('dlg-choices');
  dc.innerHTML = '';
  if (choices) choices.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'ch-btn';
    btn.textContent = c.t;
    btn.onclick = c.fn;
    dc.appendChild(btn);
  });
}

// ============================================================
// NOTIFY
// ============================================================
function notify(msg, color) {
  const el = document.createElement('div');
  el.className = 'notif';
  el.style.borderColor = color || 'var(--accent)';
  el.style.color = color || 'var(--accent)';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 2800);
}

function restartGame() {
  const savedAch = JSON.parse(localStorage.getItem('yen_ach') || '[]');
  G = {
    day:1, dow:1, phase:0, money:0, actLeft:3, actToday:[],
    design:10, social:10, combat:10, mood:50, zMood:50, favor:0,
    fullness:3,
    weather:'sunny', weatherMoodMod:0,
    daysSinceZhen:0, statueUses:0, gameCount:0, shop679:0,
    consecutiveCreate:0, frogCount:0, fishCount:0, ganggeScold:0,
    inventory:[{id:'pen',count:3},{id:'bento',count:1}],
    achievements: savedAch,
    npcPos:{
      zhen:{tx:7,ty:4},
      gangge:{tx:9,ty:4,dir:1,timer:0},
      n679:{tx:19,ty:16},
      rong:{tx:13,ty:13},
      kuma:{tx:20,ty:19},

    player:{tx:13,ty:10,dir:0},

}
